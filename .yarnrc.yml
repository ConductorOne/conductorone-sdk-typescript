# Yarn 4 configuration. Hardened for supply-chain defense.
# Yarn binary itself is pinned via the `packageManager` field in package.json
# (Corepack verifies the SHA-512 hash on first use).

nodeLinker: node-modules

# ----- Supply-chain defense -----

# Reject any npm registry version younger than 7 days at resolution time.
# Default in Yarn 4 is "3d"; this raises the bar to 7d to cover the median
# malicious-package detection window.
# Bypassed by lockfile entries that are already resolved — affects new
# resolutions (yarn add, yarn up, fresh install against a missing entry).
npmMinimalAgeGate: 7d

# No package is pre-approved to skip the age gate. Adding entries here is
# a security decision and should require CODEOWNERS review.
npmPreapprovedPackages: []

# Pin defaults explicitly so a future Yarn default change cannot silently
# weaken this posture.
enableScripts: false        # third-party postinstall scripts disabled
enableHardenedMode: true    # detects lockfile/manifest tampering on install
enableStrictSsl: true
checksumBehavior: throw     # any integrity mismatch aborts install

# No git: protocol deps allowed. Adding a pattern here is a security
# decision and should require CODEOWNERS review.
approvedGitRepositories: []

# Telemetry off.
enableTelemetry: false
